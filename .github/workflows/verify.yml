name: verify

# Plan 20:CI 跑与本地**同一条命令** scripts/verify.sh(避免"CI 才暴露")。
# 产 report/TESTREPORT.md + report/*.log 作 artifact;任一卡口 fail → job 红。

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Rust(含 wasm target + clippy/rustfmt)----
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # ---- Node(tsc 卡口需要 web/ 依赖)----
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        run: npm --prefix web ci

      # ---- 一条命令:全卡口 + 产报告 ----
      - name: Run verify
        run: bash scripts/verify.sh

      # 报告 + 原始日志作 artifact(无论成败都上传,便于排查)。
      - name: Upload TESTREPORT
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testreport
          path: report/
